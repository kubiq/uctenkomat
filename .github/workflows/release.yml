name: Release desktop builds

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Release tag to attach the builds to (created if missing)"
        required: true
        default: "v1.0.0"

permissions:
  contents: write

env:
  TAG: ${{ github.event.inputs.release_tag || github.ref_name }}

jobs:
  # Ensure the GitHub Release exists before the matrix uploads to it. Runs once
  # (not per-OS) so the three build jobs don't race to create the same release.
  create-release:
    runs-on: ubuntu-latest
    steps:
      - name: Ensure the release exists
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release view "$TAG" --repo "$GITHUB_REPOSITORY" \
            || gh release create "$TAG" --repo "$GITHUB_REPOSITORY" --title "$TAG" --generate-notes --verify-tag

  build:
    needs: create-release
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            pattern: "app/electron-dist/*.AppImage"
          - os: windows-latest
            pattern: "app/electron-dist/*.exe"
          - os: macos-latest
            pattern: "app/electron-dist/*.dmg"
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: app/package-lock.json

      - name: Install dependencies
        working-directory: app
        run: npm ci

      - name: Export web build
        working-directory: app
        run: npx expo export -p web

      # No code-signing certs. macOS is ad-hoc signed in app/electron/afterPack.cjs;
      # Windows/Linux ship unsigned.
      - name: Build desktop installer
        working-directory: app
        run: npx electron-builder --publish never

      - name: Upload to release
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release upload "$TAG" ${{ matrix.pattern }} --clobber --repo "$GITHUB_REPOSITORY"
